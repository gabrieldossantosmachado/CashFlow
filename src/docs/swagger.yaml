openapi: 3.0.3
info:
  title: CashFlow API
  version: 1.0.0
  description: Estrutura inicial da API REST com autenticação JWT.
servers:
  - url: http://localhost:3000
    description: Ambiente local
tags:
  - name: Health
  - name: Auth
  - name: Transactions
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica disponibilidade da API
      responses:
        "200":
          description: API disponível
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Gabriel
                email:
                  type: string
                  format: email
                  example: gabriel@email.com
                password:
                  type: string
                  format: password
                  example: 123456
      responses:
        "201":
          description: Usuário criado com sucesso
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login realizado com sucesso
        "401":
          description: Credenciais inválidas
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Endpoint protegido para validar token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
  /api/transactions:
    get:
      tags: [Transactions]
      summary: Lista lançamentos de débito e crédito do usuário
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista separada por tipo e totalizadores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsListResponse"
        "401":
          description: Token inválido ou ausente
    post:
      tags: [Transactions]
      summary: Cadastra lançamento de débito ou crédito
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, descricao, valor, data_lancamento]
              properties:
                tipo:
                  type: string
                  enum: [debito, credito]
                  example: credito
                descricao:
                  type: string
                  example: Pagamento recebido
                valor:
                  type: number
                  format: double
                  example: 150.5
                data_lancamento:
                  type: string
                  format: date-time
                  example: "2026-05-05T12:00:00.000Z"
      responses:
        "201":
          description: Lançamento criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCreated"
        "400":
          description: Dados inválidos (ex. tipo diferente de débito/crédito)
        "401":
          description: Token inválido ou ausente
components:
  schemas:
    TransactionsListResponse:
      type: object
      properties:
        creditos:
          type: array
          items:
            $ref: "#/components/schemas/TransactionCreated"
        debitos:
          type: array
          items:
            $ref: "#/components/schemas/TransactionCreated"
        totais:
          type: object
          properties:
            credito:
              type: number
              example: 250.5
            debito:
              type: number
              example: 100
    TransactionCreated:
      type: object
      properties:
        id:
          type: string
          example: "661fdeadbeef001122334455"
        tipo:
          type: string
          enum: [debito, credito]
        descricao:
          type: string
        valor:
          type: number
        data_lancamento:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
