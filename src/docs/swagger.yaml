openapi: 3.0.3
info:
  title: CashFlow API
  version: 1.0.0
  description: Estrutura inicial da API REST com autenticação JWT.
servers:
  - url: http://localhost:3000
    description: Ambiente local
tags:
  - name: Health
  - name: Auth
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica disponibilidade da API
      responses:
        "200":
          description: API disponível
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registra um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Gabriel
                email:
                  type: string
                  format: email
                  example: gabriel@email.com
                password:
                  type: string
                  format: password
                  example: 123456
      responses:
        "201":
          description: Usuário criado com sucesso
        "409":
          description: E-mail já cadastrado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autentica usuário e retorna JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login realizado com sucesso
        "401":
          description: Credenciais inválidas
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Endpoint protegido para validar token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
